<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🫧 Bubble Coder Integrated - Complete Real-Time System</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@0.263.1/dist/umd/lucide.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Victor+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap');
        
        body {
            margin: 0;
            font-family: 'Victor Mono', monospace;
            font-style: italic;
            overflow: hidden;
            background: #0a0a0a;
        }
        
        #root {
            width: 100vw;
            height: 100vh;
        }
        
        /* DNA animations */
        @keyframes dna-spin {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }
        
        @keyframes bubble-rise {
            0% { transform: translateY(100vh) scale(0.5); opacity: 0; }
            10% { transform: translateY(80vh) scale(1); opacity: 1; }
            90% { transform: translateY(10vh) scale(1); opacity: 1; }
            100% { transform: translateY(-10vh) scale(0.5); opacity: 0; }
        }
        
        @keyframes ship-sail {
            0% { transform: translateX(0) rotate(0deg); }
            100% { transform: translateX(90vw) rotate(10deg); }
        }
        
        @keyframes gene-pulse {
            0%, 100% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.1); filter: brightness(1.3); }
        }
        
        @keyframes transcription-flow {
            0% { stroke-dashoffset: 100; opacity: 0; }
            50% { opacity: 1; }
            100% { stroke-dashoffset: 0; opacity: 0; }
        }
        
        .dna-helix {
            animation: dna-spin 20s linear infinite;
            transform-style: preserve-3d;
        }
        
        .bubble-rise {
            animation: bubble-rise 10s ease-in-out forwards;
        }
        
        .ship-sail {
            animation: ship-sail 8s ease-in-out forwards;
        }
        
        .gene-pulse {
            animation: gene-pulse 2s ease-in-out infinite;
        }
        
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        /* Custom scrollbar */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 3px;
        }
        
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(78, 205, 196, 0.5);
            border-radius: 3px;
        }
        
        /* Persona-specific styles */
        .pirate-theme {
            --primary: #8B4513;
            --secondary: #D2691E;
            --accent: #FFD700;
        }
        
        .dna-theme {
            --primary: #FF6B6B;
            --secondary: #4ECDC4;
            --accent: #45B7D1;
        }
        
        .wizard-theme {
            --primary: #8A2BE2;
            --secondary: #9370DB;
            --accent: #DDA0DD;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback, useMemo } = React;
        const { 
            Code, FileText, Ship, Dna, GitBranch, Activity, 
            Monitor, Zap, Package, Cloud, Database, Terminal,
            Play, Pause, Settings, Eye, Globe, Anchor, Info,
            Download, Copy, Check, X, AlertCircle, ChevronRight,
            Sparkles, Box, Cpu, Layers, Hash, RotateCcw
        } = lucide;

        // Complete Bubble Coder Integrated System
        const BubbleCoderIntegrated = () => {
            // State management
            const [mode, setMode] = useState('realtime'); // realtime, generate, transcribe, deploy
            const [isActive, setIsActive] = useState(false);
            const [persona, setPersona] = useState('dna');
            const [genes, setGenes] = useState([]);
            const [bubbles, setBubbles] = useState([]);
            const [ships, setShips] = useState([]);
            const [generatedCode, setGeneratedCode] = useState('');
            const [stats, setStats] = useState({
                totalGenes: 0,
                activeTranscriptions: 0,
                bubblesGenerated: 0,
                shipsLaunched: 0,
                codeBlocks: 0,
                deliveries: 0
            });
            
            // Settings
            const [settings, setSettings] = useState({
                bubbleSpeed: 50,
                transcriptionSpeed: 50,
                autoTranscribe: true,
                syntaxHighlight: true,
                showDNA: true,
                showFlow: true,
                particleEffects: true,
                soundEffects: false
            });

            // Refs
            const animationRef = useRef(null);
            const audioContextRef = useRef(null);

            // Persona configurations
            const personas = {
                pirate: {
                    name: '🏴‍☠️ Captain Coder',
                    theme: 'pirate-theme',
                    vocabulary: {
                        start: "Ahoy! Chartin' a course through the code seas!",
                        transcribe: "Transcribin' the treasure map!",
                        ship: "Launch the vessel! Code cargo aboard!",
                        complete: "Arr! The booty is delivered!"
                    },
                    shipTypes: ['🚢', '⛵', '🏴‍☠️']
                },
                dna: {
                    name: '🧬 Dr. Helix',
                    theme: 'dna-theme',
                    vocabulary: {
                        start: "Initiating genetic code sequence...",
                        transcribe: "Transcribing DNA to mRNA...",
                        ship: "Protein synthesis complete. Deploying...",
                        complete: "Genetic payload delivered successfully!"
                    },
                    shipTypes: ['🧬', '🔬', '⚗️']
                },
                wizard: {
                    name: '🧙‍♂️ Code Mage',
                    theme: 'wizard-theme',
                    vocabulary: {
                        start: "Weaving arcane algorithms...",
                        transcribe: "Transmuting code essence...",
                        ship: "Summoning ethereal vessels...",
                        complete: "The spell is cast! Magic deployed!"
                    },
                    shipTypes: ['🔮', '✨', '🌟']
                }
            };

            // DNA base mapping
            const dnaMapping = {
                function: { base: 'A', color: '#FF6B6B', name: 'Adenine' },
                class: { base: 'T', color: '#4ECDC4', name: 'Thymine' },
                const: { base: 'G', color: '#45B7D1', name: 'Guanine' },
                import: { base: 'C', color: '#96CEB4', name: 'Cytosine' }
            };

            // Code templates
            const codeTemplates = {
                function: {
                    generate: (name) => `function ${name}() {
  // ${personas[persona].vocabulary.start}
  const result = processData();
  return result;
}`,
                    complexity: 1
                },
                class: {
                    generate: (name) => `class ${name} {
  constructor() {
    // ${personas[persona].vocabulary.start}
    this.data = [];
  }
  
  process() {
    return this.data;
  }
}`,
                    complexity: 2
                },
                const: {
                    generate: (name) => `const ${name} = {
  // Configuration
  active: true,
  mode: '${mode}',
  persona: '${persona}'
};`,
                    complexity: 1
                },
                import: {
                    generate: (name) => `import { ${name} } from './modules';
// ${personas[persona].vocabulary.start}`,
                    complexity: 0.5
                }
            };

            // Generate gene from file event
            const generateGeneFromFile = useCallback((event) => {
                const { path, content, type } = event;
                
                // Detect code type
                let codeType = 'const';
                if (content.includes('function')) codeType = 'function';
                else if (content.includes('class')) codeType = 'class';
                else if (content.includes('import')) codeType = 'import';
                
                const mapping = dnaMapping[codeType];
                const gene = {
                    id: `gene-${Date.now()}-${Math.random().toString(36).substr(2, 9)}`,
                    type: codeType,
                    base: mapping.base,
                    color: mapping.color,
                    path,
                    name: path.split('/').pop(),
                    size: content.length,
                    content: content.substring(0, 200),
                    x: 20 + Math.random() * 30,
                    y: 80,
                    age: 0,
                    transcribing: false,
                    velocity: { x: (Math.random() - 0.5) * 0.5, y: -Math.random() - 0.5 }
                };
                
                setGenes(prev => [...prev.slice(-30), gene]);
                setStats(prev => ({ ...prev, totalGenes: prev.totalGenes + 1 }));
                
                return gene;
            }, [persona, mode]);

            // Generate bubble from gene
            const transcribeGeneToBubble = useCallback((gene) => {
                const bubble = {
                    id: `bubble-${gene.id}`,
                    geneId: gene.id,
                    type: gene.type,
                    base: gene.base,
                    color: gene.color,
                    code: codeTemplates[gene.type].generate(`Generated${Date.now()}`),
                    x: gene.x,
                    y: gene.y,
                    size: 40 + (gene.size / 100),
                    velocity: { x: gene.velocity.x * 2, y: -1.5 },
                    age: 0,
                    transcribing: true
                };
                
                setBubbles(prev => [...prev.slice(-20), bubble]);
                setStats(prev => ({ 
                    ...prev, 
                    bubblesGenerated: prev.bubblesGenerated + 1,
                    activeTranscriptions: prev.activeTranscriptions + 1
                }));
                
                // Mark gene as transcribed
                setGenes(prev => prev.map(g => 
                    g.id === gene.id ? { ...g, transcribing: true } : g
                ));
                
                return bubble;
            }, []);

            // Create ship from bubble
            const createShipFromBubble = useCallback((bubble) => {
                const currentPersona = personas[persona];
                const ship = {
                    id: `ship-${bubble.id}`,
                    bubbleId: bubble.id,
                    type: currentPersona.shipTypes[Math.floor(Math.random() * currentPersona.shipTypes.length)],
                    cargo: bubble.code,
                    cargoType: bubble.type,
                    base: bubble.base,
                    color: bubble.color,
                    x: bubble.x,
                    y: bubble.y,
                    targetX: 90,
                    targetY: 50,
                    progress: 0,
                    sailing: true,
                    message: currentPersona.vocabulary.ship
                };
                
                setShips(prev => [...prev.slice(-10), ship]);
                setStats(prev => ({ 
                    ...prev, 
                    shipsLaunched: prev.shipsLaunched + 1,
                    activeTranscriptions: Math.max(0, prev.activeTranscriptions - 1)
                }));
                
                // Add code to output
                setGeneratedCode(prev => prev + (prev ? '\n\n' : '') + bubble.code);
                setStats(prev => ({ ...prev, codeBlocks: prev.codeBlocks + 1 }));
                
                return ship;
            }, [persona]);

            // Simulation loop
            useEffect(() => {
                if (!isActive) return;
                
                const simulate = () => {
                    // Simulate file events
                    if (Math.random() < 0.02) {
                        const files = [
                            'src/components/Dashboard.jsx',
                            'src/utils/processor.js',
                            'src/api/endpoints.js',
                            'src/constants/config.js'
                        ];
                        
                        const file = files[Math.floor(Math.random() * files.length)];
                        const content = `// ${file}\n${Object.keys(codeTemplates)[Math.floor(Math.random() * 4)]} example`;
                        
                        generateGeneFromFile({ path: file, content, type: 'change' });
                    }
                    
                    // Auto-transcribe genes
                    if (settings.autoTranscribe) {
                        const readyGenes = genes.filter(g => !g.transcribing && g.age > 30 && g.age < 100);
                        if (readyGenes.length > 0 && Math.random() < 0.05) {
                            transcribeGeneToBubble(readyGenes[0]);
                        }
                    }
                    
                    // Create ships from mature bubbles
                    const readyBubbles = bubbles.filter(b => b.age > 50 && b.transcribing);
                    if (readyBubbles.length > 0 && Math.random() < 0.1) {
                        createShipFromBubble(readyBubbles[0]);
                        setBubbles(prev => prev.map(b => 
                            b.id === readyBubbles[0].id ? { ...b, transcribing: false } : b
                        ));
                    }
                    
                    // Update entities
                    setGenes(prev => prev.map(gene => ({
                        ...gene,
                        x: gene.x + gene.velocity.x,
                        y: gene.y + gene.velocity.y,
                        velocity: {
                            x: gene.velocity.x * 0.99,
                            y: gene.velocity.y + 0.02
                        },
                        age: gene.age + 1
                    })).filter(gene => gene.age < 200 && gene.y > 0));
                    
                    setBubbles(prev => prev.map(bubble => ({
                        ...bubble,
                        x: bubble.x + bubble.velocity.x,
                        y: bubble.y + bubble.velocity.y,
                        velocity: {
                            x: bubble.velocity.x * 0.99,
                            y: bubble.velocity.y - 0.01
                        },
                        age: bubble.age + 1
                    })).filter(bubble => bubble.age < 150 && bubble.y > -100));
                    
                    setShips(prev => prev.map(ship => {
                        if (!ship.sailing) return ship;
                        
                        const progress = Math.min(100, ship.progress + 2);
                        const x = ship.x + (ship.targetX - ship.x) * 0.02;
                        const y = ship.y + (ship.targetY - ship.y) * 0.02;
                        
                        if (progress >= 100) {
                            setStats(prev => ({ ...prev, deliveries: prev.deliveries + 1 }));
                        }
                        
                        return { ...ship, x, y, progress, sailing: progress < 100 };
                    }).filter(ship => ship.progress < 100));
                    
                    animationRef.current = requestAnimationFrame(simulate);
                };
                
                animationRef.current = requestAnimationFrame(simulate);
                
                return () => {
                    if (animationRef.current) {
                        cancelAnimationFrame(animationRef.current);
                    }
                };
            }, [isActive, genes, bubbles, settings, generateGeneFromFile, transcribeGeneToBubble, createShipFromBubble]);

            // Icon wrapper
            const Icon = ({ icon: IconComponent, ...props }) => {
                useEffect(() => {
                    lucide.createIcons();
                }, []);
                return <IconComponent {...props} />;
            };

            const currentPersona = personas[persona];

            return (
                <div className={`w-full h-screen text-white overflow-hidden relative ${currentPersona.theme}`}>
                    {/* Dynamic background */}
                    <div className="absolute inset-0 bg-gradient-to-br from-gray-900 via-blue-900 to-purple-900">
                        {settings.particleEffects && (
                            <div className="absolute inset-0 opacity-10">
                                {Array.from({ length: 50 }).map((_, i) => (
                                    <div
                                        key={i}
                                        className="absolute w-1 h-1 bg-white rounded-full animate-pulse"
                                        style={{
                                            left: `${Math.random() * 100}%`,
                                            top: `${Math.random() * 100}%`,
                                            animationDelay: `${Math.random() * 5}s`
                                        }}
                                    />
                                ))}
                            </div>
                        )}
                    </div>

                    {/* Header */}
                    <div className="absolute top-0 left-0 right-0 z-30 glass p-4">
                        <div className="flex justify-between items-center">
                            <div>
                                <h1 className="text-3xl font-bold italic flex items-center">
                                    <span className="text-4xl mr-3">{currentPersona.name.split(' ')[0]}</span>
                                    Bubble Coder Complete
                                </h1>
                                <p className="text-sm opacity-75 mt-1">
                                    Real-time code generation with {currentPersona.name}
                                </p>
                            </div>
                            
                            <div className="flex items-center space-x-4">
                                {/* Mode selector */}
                                <div className="flex items-center space-x-2 bg-black bg-opacity-30 rounded-lg p-1">
                                    {[
                                        { id: 'realtime', label: 'Real-Time', icon: Activity },
                                        { id: 'generate', label: 'Generate', icon: Sparkles },
                                        { id: 'transcribe', label: 'Transcribe', icon: Dna },
                                        { id: 'deploy', label: 'Deploy', icon: Ship }
                                    ].map(({ id, label, icon }) => (
                                        <button
                                            key={id}
                                            onClick={() => setMode(id)}
                                            className={`flex items-center space-x-1 px-3 py-2 rounded-md transition-all ${
                                                mode === id 
                                                    ? 'bg-purple-600 text-white' 
                                                    : 'text-gray-300 hover:bg-white hover:bg-opacity-10'
                                            }`}
                                        >
                                            <Icon icon={icon} size={16} />
                                            <span className="text-sm">{label}</span>
                                        </button>
                                    ))}
                                </div>
                                
                                <button
                                    onClick={() => setIsActive(!isActive)}
                                    className={`flex items-center space-x-2 px-6 py-3 rounded-lg font-medium transition-all ${
                                        isActive 
                                            ? 'bg-red-600 hover:bg-red-700 text-white' 
                                            : 'bg-green-600 hover:bg-green-700 text-white'
                                    }`}
                                >
                                    <Icon icon={isActive ? Pause : Play} size={20} />
                                    <span>{isActive ? 'Pause' : 'Start'}</span>
                                </button>
                                
                                <button
                                    onClick={() => {
                                        setGenes([]);
                                        setBubbles([]);
                                        setShips([]);
                                        setGeneratedCode('');
                                        setStats({
                                            totalGenes: 0,
                                            activeTranscriptions: 0,
                                            bubblesGenerated: 0,
                                            shipsLaunched: 0,
                                            codeBlocks: 0,
                                            deliveries: 0
                                        });
                                    }}
                                    className="p-3 bg-orange-600 hover:bg-orange-700 text-white rounded-lg transition-all"
                                >
                                    <Icon icon={RotateCcw} size={20} />
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* Left Panel - DNA Helix */}
                    {settings.showDNA && (
                        <div className="absolute left-4 top-24 bottom-4 w-48 glass rounded-lg p-4 overflow-hidden">
                            <h3 className="text-lg font-semibold mb-4 flex items-center">
                                <Icon icon={Dna} size={20} className="mr-2 text-green-400" />
                                DNA Sequence
                            </h3>
                            
                            <div className="dna-helix">
                                {genes.slice(-10).map((gene, index) => {
                                    const complement = gene.base === 'A' ? 'T' : 
                                                     gene.base === 'T' ? 'A' : 
                                                     gene.base === 'G' ? 'C' : 'G';
                                    
                                    return (
                                        <div key={gene.id} className="flex items-center mb-2">
                                            <div
                                                className="w-6 h-6 rounded-full border-2 flex items-center justify-center text-xs font-bold"
                                                style={{
                                                    backgroundColor: `${gene.color}30`,
                                                    borderColor: gene.color,
                                                    color: gene.color
                                                }}
                                            >
                                                {gene.base}
                                            </div>
                                            <div className="flex-1 h-0.5 mx-2" style={{ backgroundColor: gene.color + '40' }} />
                                            <div
                                                className="w-6 h-6 rounded-full border-2 flex items-center justify-center text-xs font-bold"
                                                style={{
                                                    backgroundColor: `${dnaMapping[Object.keys(dnaMapping).find(k => dnaMapping[k].base === complement)].color}30`,
                                                    borderColor: dnaMapping[Object.keys(dnaMapping).find(k => dnaMapping[k].base === complement)].color,
                                                    color: dnaMapping[Object.keys(dnaMapping).find(k => dnaMapping[k].base === complement)].color
                                                }}
                                            >
                                                {complement}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                            
                            <div className="mt-4 pt-4 border-t border-gray-600">
                                <h4 className="text-sm font-semibold mb-2">Legend</h4>
                                <div className="space-y-1 text-xs">
                                    {Object.entries(dnaMapping).map(([type, info]) => (
                                        <div key={type} className="flex items-center">
                                            <div
                                                className="w-3 h-3 rounded mr-2"
                                                style={{ backgroundColor: info.color }}
                                            />
                                            <span>{info.base} - {type}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Right Panel - Stats & Settings */}
                    <div className="absolute right-4 top-24 w-64 space-y-4 z-20">
                        {/* Stats */}
                        <div className="glass rounded-lg p-4">
                            <h3 className="text-lg font-semibold mb-3 flex items-center">
                                <Icon icon={Activity} size={20} className="mr-2 text-green-400" />
                                Live Statistics
                            </h3>
                            <div className="grid grid-cols-2 gap-2 text-sm">
                                <div className="text-center p-2 bg-black bg-opacity-30 rounded">
                                    <div className="text-2xl font-bold text-yellow-400">{stats.totalGenes}</div>
                                    <div className="text-xs text-gray-400">Genes</div>
                                </div>
                                <div className="text-center p-2 bg-black bg-opacity-30 rounded">
                                    <div className="text-2xl font-bold text-green-400">{stats.activeTranscriptions}</div>
                                    <div className="text-xs text-gray-400">Active</div>
                                </div>
                                <div className="text-center p-2 bg-black bg-opacity-30 rounded">
                                    <div className="text-2xl font-bold text-blue-400">{stats.shipsLaunched}</div>
                                    <div className="text-xs text-gray-400">Ships</div>
                                </div>
                                <div className="text-center p-2 bg-black bg-opacity-30 rounded">
                                    <div className="text-2xl font-bold text-purple-400">{stats.deliveries}</div>
                                    <div className="text-xs text-gray-400">Delivered</div>
                                </div>
                            </div>
                        </div>

                        {/* Settings */}
                        <div className="glass rounded-lg p-4">
                            <h3 className="text-lg font-semibold mb-3 flex items-center">
                                <Icon icon={Settings} size={20} className="mr-2" />
                                Settings
                            </h3>
                            <div className="space-y-3">
                                <div>
                                    <label className="text-xs text-gray-400">Persona</label>
                                    <select
                                        value={persona}
                                        onChange={(e) => setPersona(e.target.value)}
                                        className="w-full bg-black bg-opacity-30 text-white p-2 rounded border border-gray-600 text-sm"
                                    >
                                        {Object.entries(personas).map(([key, p]) => (
                                            <option key={key} value={key}>{p.name}</option>
                                        ))}
                                    </select>
                                </div>
                                
                                <div>
                                    <label className="text-xs text-gray-400">Speed ({settings.bubbleSpeed}%)</label>
                                    <input
                                        type="range"
                                        min="10"
                                        max="100"
                                        value={settings.bubbleSpeed}
                                        onChange={(e) => setSettings(prev => ({
                                            ...prev,
                                            bubbleSpeed: parseInt(e.target.value)
                                        }))}
                                        className="w-full"
                                    />
                                </div>
                                
                                <label className="flex items-center space-x-2 text-sm">
                                    <input
                                        type="checkbox"
                                        checked={settings.autoTranscribe}
                                        onChange={(e) => setSettings(prev => ({
                                            ...prev,
                                            autoTranscribe: e.target.checked
                                        }))}
                                        className="rounded"
                                    />
                                    <span>Auto-transcribe</span>
                                </label>
                                
                                <label className="flex items-center space-x-2 text-sm">
                                    <input
                                        type="checkbox"
                                        checked={settings.showDNA}
                                        onChange={(e) => setSettings(prev => ({
                                            ...prev,
                                            showDNA: e.target.checked
                                        }))}
                                        className="rounded"
                                    />
                                    <span>Show DNA Helix</span>
                                </label>
                            </div>
                        </div>
                    </div>

                    {/* Main Visualization Area */}
                    <div className="absolute inset-0 pt-20">
                        {/* Genes */}
                        {genes.map(gene => (
                            <div
                                key={gene.id}
                                className={`absolute transition-all duration-300 ${
                                    gene.transcribing ? 'gene-pulse' : ''
                                }`}
                                style={{
                                    left: `${gene.x}%`,
                                    top: `${gene.y}%`,
                                    transform: 'translate(-50%, -50%)'
                                }}
                            >
                                <div
                                    className="rounded-full border-2 flex items-center justify-center font-bold cursor-pointer"
                                    style={{
                                        width: `${30 + Math.min(gene.size / 100, 20)}px`,
                                        height: `${30 + Math.min(gene.size / 100, 20)}px`,
                                        backgroundColor: `${gene.color}30`,
                                        borderColor: gene.color,
                                        color: gene.color,
                                        opacity: gene.transcribing ? 0.5 : 1
                                    }}
                                    onClick={() => !gene.transcribing && transcribeGeneToBubble(gene)}
                                >
                                    {gene.base}
                                </div>
                                <div className="absolute top-full mt-1 text-xs text-center whitespace-nowrap">
                                    <div style={{ color: gene.color }}>{gene.type}</div>
                                </div>
                            </div>
                        ))}

                        {/* Bubbles */}
                        {bubbles.map(bubble => (
                            <div
                                key={bubble.id}
                                className={`absolute transition-all duration-300 ${
                                    bubble.transcribing ? 'bubble-rise' : ''
                                }`}
                                style={{
                                    left: `${bubble.x}%`,
                                    top: `${bubble.y}%`,
                                    transform: 'translate(-50%, -50%)'
                                }}
                            >
                                <div
                                    className="rounded-full border-2 flex items-center justify-center backdrop-blur-sm"
                                    style={{
                                        width: `${bubble.size}px`,
                                        height: `${bubble.size}px`,
                                        backgroundColor: `${bubble.color}20`,
                                        borderColor: bubble.color,
                                        boxShadow: `0 0 20px ${bubble.color}40`
                                    }}
                                >
                                    <Icon icon={Code} size={bubble.size * 0.4} style={{ color: bubble.color }} />
                                </div>
                            </div>
                        ))}

                        {/* Ships */}
                        {ships.map(ship => (
                            <div
                                key={ship.id}
                                className={`absolute transition-all duration-300 text-3xl ${
                                    ship.sailing ? 'ship-sail' : ''
                                }`}
                                style={{
                                    left: `${ship.x}%`,
                                    top: `${ship.y}%`,
                                    transform: 'translate(-50%, -50%)',
                                    filter: `drop-shadow(0 0 10px ${ship.color})`
                                }}
                            >
                                {ship.type}
                                <div
                                    className="absolute -bottom-1 left-0 h-1 rounded-full"
                                    style={{
                                        width: `${ship.progress}%`,
                                        backgroundColor: ship.color
                                    }}
                                />
                            </div>
                        ))}

                        {/* Flow indicators */}
                        {settings.showFlow && (
                            <svg className="absolute inset-0 w-full h-full pointer-events-none">
                                <defs>
                                    <marker
                                        id="arrowhead"
                                        markerWidth="10"
                                        markerHeight="7"
                                        refX="10"
                                        refY="3.5"
                                        orient="auto"
                                    >
                                        <polygon
                                            points="0 0, 10 3.5, 0 7"
                                            fill="rgba(255, 255, 255, 0.3)"
                                        />
                                    </marker>
                                </defs>
                                
                                {/* Gene → Bubble flow */}
                                <path
                                    d="M 25% 70% Q 35% 50% 45% 40%"
                                    stroke="rgba(255, 255, 255, 0.1)"
                                    strokeWidth="2"
                                    fill="none"
                                    markerEnd="url(#arrowhead)"
                                />
                                
                                {/* Bubble → Ship flow */}
                                <path
                                    d="M 45% 40% Q 60% 30% 75% 50%"
                                    stroke="rgba(255, 255, 255, 0.1)"
                                    strokeWidth="2"
                                    fill="none"
                                    markerEnd="url(#arrowhead)"
                                />
                            </svg>
                        )}
                    </div>

                    {/* Code Output */}
                    <div className="absolute bottom-4 left-56 right-72 z-20 glass rounded-lg p-4 max-h-48 overflow-hidden">
                        <div className="flex items-center justify-between mb-2">
                            <h3 className="text-sm font-semibold flex items-center">
                                <Icon icon={Terminal} size={16} className="mr-2" />
                                Generated Code
                            </h3>
                            <div className="flex items-center space-x-2">
                                <button
                                    onClick={() => {
                                        navigator.clipboard.writeText(generatedCode);
                                    }}
                                    className="p-1 bg-blue-600 hover:bg-blue-700 rounded transition-all"
                                >
                                    <Icon icon={Copy} size={14} />
                                </button>
                                <button
                                    onClick={() => {
                                        const blob = new Blob([generatedCode], { type: 'text/plain' });
                                        const url = URL.createObjectURL(blob);
                                        const a = document.createElement('a');
                                        a.href = url;
                                        a.download = `bubble-code-${Date.now()}.js`;
                                        a.click();
                                        URL.revokeObjectURL(url);
                                    }}
                                    className="p-1 bg-green-600 hover:bg-green-700 rounded transition-all"
                                >
                                    <Icon icon={Download} size={14} />
                                </button>
                            </div>
                        </div>
                        
                        <div className="overflow-y-auto custom-scrollbar max-h-32">
                            <pre className="text-xs font-mono">
                                <code className={settings.syntaxHighlight ? "language-javascript" : ""}>
                                    {generatedCode || `// ${currentPersona.vocabulary.start}\n// Generated code will appear here...`}
                                </code>
                            </pre>
                        </div>
                    </div>

                    {/* Status messages */}
                    <div className="absolute bottom-4 left-4 z-20 text-xs space-y-1 max-w-48">
                        <div className="glass px-3 py-1 rounded">
                            {currentPersona.vocabulary[isActive ? 'start' : 'complete']}
                        </div>
                        {isActive && (
                            <div className="text-gray-400">
                                {mode === 'realtime' && 'Monitoring file changes...'}
                                {mode === 'generate' && 'Generating code bubbles...'}
                                {mode === 'transcribe' && 'Transcribing DNA...'}
                                {mode === 'deploy' && 'Deploying ships...'}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // Render the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<BubbleCoderIntegrated />);
    </script>
</body>
</html>
